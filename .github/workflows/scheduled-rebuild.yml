name: Scheduled Rebuild

on:
  schedule:
    - cron: "0 12 * * *" # 毎日 21:00 JST
  workflow_dispatch: # 手動実行

permissions:
  contents: write

jobs:
  check-and-rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch latest content and update cache
        id: diff
        run: node scripts/update-cache.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: nekoneko02
          NOTE_RSS_URL: https://note.com/alg_geo/rss

      - name: Commit and push updated cache
        if: steps.diff.outputs.has_diff == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content-cache/note.json content-cache/github.json
          git commit -m "chore: update content cache"
          git push
